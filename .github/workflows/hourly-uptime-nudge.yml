name: Hourly uptime ping

# Hits both API services hourly so a Railway service that quietly
# crashed shows as a red workflow run instead of dying silently
# until a real user trips over it.
#
# Required repo variables:
#   API_BASE_URL          vlrggapi production URL (Railway)
#   TRACKER_API_BASE_URL  vlrscout-tracker-api production URL
#                         (optional — tracker step skipped if unset)

on:
  schedule:
    - cron: "0 * * * *"   # top of every hour, UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: API health
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::API_BASE_URL repo variable not set." >&2
            exit 1
          fi
          # 20s budget — generous for Railway cold-start; a real outage
          # is well past this.
          curl -fsS --max-time 20 "$API_BASE_URL/v2/health" > /dev/null
          echo "::notice::API health OK"

      - name: Tracker API health
        env:
          TRACKER_API_BASE_URL: ${{ vars.TRACKER_API_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${TRACKER_API_BASE_URL:-}" ]; then
            echo "::notice::TRACKER_API_BASE_URL not set — skipping tracker ping."
            exit 0
          fi
          # The leaderboard endpoint does a real tracker.gg scrape
          # which can take 30-60s and gates on CF challenges; that's
          # too noisy for an uptime check. The root path returns a
          # tiny version stub instantly — perfect for liveness.
          curl -fsS --max-time 20 "$TRACKER_API_BASE_URL/" > /dev/null
          echo "::notice::Tracker health OK"
